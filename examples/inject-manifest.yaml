mode: inject
title: Example Inject Pack
client: Example Corp
environment: Production
classification: TLP:AMBER
instructions: >
  Turn the supplied evidence into draft injects for a corporate blue-team exercise.
template: ./templates/default/inject.md.tmpl
artifacts:
  - ./artifacts
ai:
  provider: ollama
  endpoint: http://127.0.0.1:11434
  profile: balanced
  # model: gemma4:26b
  # fallback_model: gemma4:e4b
  temperature: 0.2
  max_tokens: 2048
  timeout_seconds: 90
  max_prompt_artifacts: 12
  max_prompt_observations: 40
  # prompt_dir: ./prompts
output:
  formats:
    - markdown
    - json
    - pdf
  project_dir: ./project
  redaction_rules:
    - '(?m)\b\d{1,3}(?:\.\d{1,3}){3}\b'
